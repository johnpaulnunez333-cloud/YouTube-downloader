<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>YTDownloader</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="hero d flex-column align-items-center justify-content-center text-center">
            <div class="brand mb-2">
                <i class="bi bi-play-circle-fill brand-icon"></i>
            </div>
            <h1 class="site-title">YTGrap</h1>
            <p class="site-sub">Download YouTube Videos as MP3 or MP4 - fast and free.</p>
            
            <div class="search-card mt-4 w-100" style="max-width:620px">
                <div class="app-root"></div>
                     
                <div class="input-row d-flex gap-2 mb-3">
                    <input type="text" id="yt-url" class="form-control url-input" placeholder="Paste YouTube url here"/>
                    <button id="convert-btn" class="btn btn-grap">
                        <i class="bi bi-arrow-right-circle-fill me-1"></i> Grap
                    </button>
                </div>
                
                <div class="format-row d-flex gap-2 justify-content-center mb-3">
                    <button id="btn-mp3" class="btn btn-format active" data-format="mp3">
                        <i class="bi bi-music-beamed me-1"></i> MP3
                    </button>
                    <button id="btn-mp4" class="btn btn-format" data-format="mp4">
                    </button>
                </div>
                
                <div id="status-box" class="status-box d-none"></div>
                
                <div id="result-box" class="result-box d-none">
                    <div class="d-flex align-items-center gap-3">
                        <img id="thumb" src=" " alt="Thumbnail" class="thumb" />
                        <div class="text-start">
                            <p id="video-title" class="video-title mb-1"></p>
                            <a id="download-link" href="#" class="btn btn-download" target="blank" download>
                            <i class="bi bi-download me-1"></i> Download
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
    </body>
</html>
